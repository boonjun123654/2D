<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>下注页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">2D下注表格</h2>
    <form method="POST">
        <input type="hidden" name="rows" value="1">
        <div class="mb-3">
            <label>号码（两位数）：</label>
            <input type="text" class="form-control" name="number_0" maxlength="2" required>
        </div>
        <div class="mb-3">
            <label>下注金额：</label>
            <div class="input-group mb-1">
                <span class="input-group-text">2D</span>
                <input type="number" name="2d_0" class="form-control" placeholder="金额">
            </div>
            <div class="input-group mb-1">
                <span class="input-group-text">单</span>
                <input type="number" name="single_0" class="form-control" placeholder="金额">
            </div>
            <div class="input-group mb-1">
                <span class="input-group-text">双</span>
                <input type="number" name="double_0" class="form-control" placeholder="金额">
            </div>
            <div class="input-group mb-1">
                <span class="input-group-text">大</span>
                <input type="number" name="big_0" class="form-control" placeholder="金额">
            </div>
            <div class="input-group mb-1">
                <span class="input-group-text">小</span>
                <input type="number" name="small_0" class="form-control" placeholder="金额">
            </div>
        </div>
        <div class="mb-3">
            <label>选择时段：</label><br>
            {% for game in games %}
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="games_0" value="{{ game.id }}" id="game{{ game.id }}">
                    <label class="form-check-label" for="game{{ game.id }}">
                        {{ game.hour }} 点
                    </label>
                </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary w-100">确认下注</button>
    </form>
</div>
</body>
</html>
