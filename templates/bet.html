<form method="POST">
  <table border="1" style="width:100%; text-align:center;">
    <thead>
      <tr>
        <th>#</th>
        <th>下注号码</th>
        <th>2D</th>
        <th>单</th>
        <th>双</th>
        <th>大</th>
        <th>小</th>
        {% for g in games %}
          <th>{{ g.hour }}点</th>
        {% endfor %}
        <th>总额 (MYR)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td><input type="text" name="number_0" maxlength="2" style="width: 60px;"></td>
        <td><input type="number" step="0.01" name="2d_0" class="amt"></td>
        <td><input type="number" step="0.01" name="single_0" class="amt"></td>
        <td><input type="number" step="0.01" name="double_0" class="amt"></td>
        <td><input type="number" step="0.01" name="big_0" class="amt"></td>
        <td><input type="number" step="0.01" name="small_0" class="amt"></td>
        {% for g in games %}
          <td><input type="checkbox" name="games_0" value="{{ g.id }}"></td>
        {% endfor %}
        <td><span id="total_0">0.00</span></td>
      </tr>
    </tbody>
  </table>
  <input type="hidden" name="rows" value="1">
  <br>
  <button type="submit">确认下注</button>
</form>

<script>
  // 自动合计金额
  document.querySelectorAll('.amt').forEach(input => {
    input.addEventListener('input', () => {
      let total = 0;
      document.querySelectorAll('.amt').forEach(a => {
        total += parseFloat(a.value || 0);
      });
      document.getElementById('total_0').textContent = total.toFixed(2);
    });
  });
</script>
